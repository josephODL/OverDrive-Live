<script type="text/babel">
const { useState, useEffect, useRef } = React;

const accent = '#C41E1E';

/* ── Scroll reveal ── */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal,.reveal-zoom');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.08 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

/* ── SpeedCanvas (speed-line bg) ── */
const SpeedCanvas = ({ style }) => {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let raf;
    const lines = Array.from({ length: 60 }, () => ({
      x: Math.random(), y: Math.random(), speed: 0.002 + Math.random() * 0.006,
      len: 0.04 + Math.random() * 0.1, alpha: 0.04 + Math.random() * 0.1,
    }));
    const draw = () => {
      const w = canvas.width = canvas.offsetWidth;
      const h = canvas.height = canvas.offsetHeight;
      ctx.clearRect(0, 0, w, h);
      lines.forEach(l => {
        l.x += l.speed;
        if (l.x > 1 + l.len) l.x = -l.len;
        ctx.beginPath();
        ctx.moveTo((l.x - l.len) * w, l.y * h);
        ctx.lineTo(l.x * w, l.y * h);
        ctx.strokeStyle = `rgba(196,30,30,${l.alpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      });
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => cancelAnimationFrame(raf);
  }, []);
  return (
    <div className="speed-canvas-wrap" style={style}>
      <canvas ref={canvasRef} style={{ width: '100%', height: '100%', display: 'block' }} />
    </div>
  );
};

/* ── SectionLabel ── */

);
