<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Scoring — OverDrive Live Admin</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* CSS vars used by inline JS-generated HTML */
    :root { --muted: #444; --border: #1a1a1a; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #0A0A0A; color: #fff; font-family: Barlow, sans-serif; min-height: 100vh; }

    /* ── Layout ── */
    .app { display: flex; min-height: 100vh; }

    .sidebar {
      width: 220px; background: #0D0D0D; border-right: 1px solid #1a1a1a;
      display: flex; flex-direction: column; flex-shrink: 0;
      position: fixed; top: 0; left: 0; bottom: 0;
    }

    .sidebar-logo {
      padding: 20px 20px 16px;
      border-bottom: 1px solid #1a1a1a;
    }

    .sidebar-wordmark {
      font-family: Barlow, sans-serif; font-size: 14px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: #fff;
      margin-bottom: 6px;
    }

    .sidebar-wordmark span { color: #C41E1E; }

    .logo-sub {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: #2e2e2e;
    }

    .sidebar-nav { padding: 8px 0; flex: 1; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; cursor: pointer;
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: #3a3a3a; transition: all .15s;
      border-left: 3px solid transparent;
    }

    .nav-item:hover { color: #888; background: #111; }
    .nav-item.active { color: #fff; border-left-color: #C41E1E; background: rgba(196,30,30,.06); }

    .sidebar-footer { padding: 16px 20px; border-top: 1px solid #1a1a1a; }

    .conn-indicator {
      display: flex; align-items: center; gap: 7px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    }

    .conn-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #22c55e; box-shadow: 0 0 6px #22c55e; flex-shrink: 0;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .main { margin-left: 220px; flex: 1; padding: 40px 40px 80px; }

    /* ── Page header ── */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
    }

    .page-title {
      font-family: Barlow, sans-serif; font-size: 26px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em; color: #fff;
    }

    /* ── Buttons ── */
    .btn {
      font-family: Barlow, sans-serif; font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; border: none;
      border-radius: 4px; cursor: pointer; padding: 10px 20px;
      transition: background .15s, opacity .15s, border-color .15s, color .15s;
      white-space: nowrap; display: inline-flex; align-items: center; gap: 6px;
    }

    .btn-primary { background: #C41E1E; color: #fff; }
    .btn-primary:hover { background: #991616; }
    .btn-secondary { background: transparent; color: #888; border: 1px solid #222; }
    .btn-secondary:hover { border-color: #444; color: #fff; }
    .btn-danger { background: transparent; color: #3a3a3a; border: 1px solid #1a1a1a; }
    .btn-danger:hover { background: rgba(196,30,30,.1); color: #C41E1E; border-color: rgba(196,30,30,.3); }
    .btn-sm { padding: 6px 12px; font-size: 11px; }
    .btn:disabled { opacity: .3; cursor: not-allowed; pointer-events: none; }

    /* ── Section ── */
    .section { display: none; }
    .section.active { display: block; }

    /* ── Games grid ── */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .game-card {
      background: #0D0D0D; border: 1px solid #1a1a1a; border-radius: 6px;
      padding: 20px; transition: border-color .2s;
    }

    .game-card:hover { border-color: #2a2a2a; }

    .game-card-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 14px;
    }

    .game-status {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    }

    .status-scheduled { background: rgba(80,80,80,.1); color: #444; }
    .status-live { background: rgba(196,30,30,.12); color: #C41E1E; }
    .status-live::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%;
      background: #C41E1E; display: inline-block; animation: pulse 1s infinite;
    }
    .status-complete { background: rgba(34,197,94,.1); color: #22c55e; }
    .status-pre_game { background: rgba(245,158,11,.1); color: #f59e0b; }

    .game-sport-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: #2e2e2e;
    }

    .game-teams {
      font-family: Barlow, sans-serif; font-size: 18px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em; color: #e0e0e0;
      margin-bottom: 4px;
    }

    .game-meta { font-size: 11px; color: #333; margin-bottom: 14px; }

    .game-score {
      font-family: 'JetBrains Mono', monospace; font-size: 28px;
      font-weight: 500; color: #fff; margin-bottom: 16px; letter-spacing: -0.02em;
    }

    .game-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Teams / Sports list ── */
    .row-list {
      border: 1px solid #1a1a1a; border-radius: 6px; overflow: hidden;
    }

    .data-row {
      display: flex; align-items: center; gap: 14px;
      background: #0D0D0D; padding: 14px 20px;
      border-bottom: 1px solid #141414; transition: background .15s;
    }

    .data-row:last-child { border-bottom: none; }
    .data-row:hover { background: #111; }

    .team-color-swatch {
      width: 28px; height: 28px; border-radius: 4px; flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.07);
    }

    .row-info { flex: 1; }
    .row-name { font-size: 14px; font-weight: 600; color: #e0e0e0; }
    .row-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #3a3a3a; margin-top: 2px; }

    .preset-badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: #2e2e2e; border: 1px solid #1e1e1e; padding: 3px 8px; border-radius: 3px;
    }

    /* ── URL box ── */
    .url-box {
      background: #0A0A0A; border: 1px solid #1e1e1e; border-radius: 4px;
      padding: 10px 14px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
    }

    .url-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: #3a3a3a; min-width: 90px; flex-shrink: 0;
    }

    .url-value {
      font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #666;
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .btn-copy {
      font-family: Barlow, sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: transparent; border: 1px solid #1e1e1e; border-radius: 3px;
      color: #3a3a3a; padding: 4px 10px; cursor: pointer; flex-shrink: 0;
      transition: all .15s;
    }

    .btn-copy:hover { color: #aaa; border-color: #333; }
    .btn-copy.copied { color: #22c55e; border-color: rgba(34,197,94,.3); }

    /* ── Forms ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 7px; }
    .form-group.full { grid-column: 1 / -1; }

    .form-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #555; display: block;
    }

    label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #555; }

    input, select, textarea {
      background: #0A0A0A; border: 1px solid #222; border-radius: 4px;
      color: #fff; font-family: Barlow, sans-serif; font-size: 13px;
      padding: 10px 14px; transition: border-color .15s; width: 100%; outline: none;
    }

    input:focus, select:focus, textarea:focus { border-color: #C41E1E; }
    input::placeholder { color: #2e2e2e; }
    select option { background: #111; }
    input[type="color"] { padding: 4px 6px; height: 42px; cursor: pointer; }
    input[type="datetime-local"] { color-scheme: dark; }

    /* ── Modals ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.75);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 500; padding: 20px;
    }

    .modal-overlay.hidden { display: none; }

    .modal {
      background: #111; border: 1px solid #222; border-radius: 8px;
      padding: 32px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
    }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }

    .modal-title {
      font-family: Barlow, sans-serif; font-size: 22px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em;
    }

    .modal-close {
      background: none; border: none; color: #333; font-size: 20px;
      cursor: pointer; line-height: 1; padding: 4px; transition: color .15s;
    }

    .modal-close:hover { color: #fff; }

    .modal-footer {
      display: flex; gap: 10px; justify-content: flex-end;
      margin-top: 28px; padding-top: 20px; border-top: 1px solid #1a1a1a;
    }

    /* ── URLs modal sections ── */
    .urls-section { margin-bottom: 24px; }

    .urls-section-title {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #2e2e2e; margin-bottom: 10px;
    }

    /* ── Empty states ── */
    .empty { text-align: center; padding: 72px 20px; }
    .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }
    .empty-text { font-size: 13px; color: #2e2e2e; margin-bottom: 20px; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px;
      padding: 10px 20px; font-size: 12px; color: #aaa;
      opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none; z-index: 999; white-space: nowrap;
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { color: #22c55e; border-color: rgba(34,197,94,.3); }
    #toast.error { color: #C41E1E; border-color: rgba(196,30,30,.3); }
  </style>
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-wordmark">OverDrive <span>Live</span></div>
      <div class="logo-sub">Live Scoring Admin</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" onclick="showSection('games', this)">Games</div>
      <div class="nav-item" onclick="showSection('teams', this)">Teams</div>
      <div class="nav-item" onclick="showSection('sports', this)">Sports</div>
    </nav>
    <div class="sidebar-footer">
      <div class="conn-indicator">
        <div class="conn-dot" id="conn-dot"></div>
        <span id="conn-text" style="color:#333;">Connected</span>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">

    <!-- GAMES SECTION -->
    <div class="section active" id="section-games">
      <div class="page-header">
        <h1 class="page-title">Games</h1>
        <button class="btn btn-primary" onclick="openNewGameModal()">+ New Game</button>
      </div>
      <div class="games-grid" id="games-grid">
        <div class="empty">
          <div class="empty-icon">🎮</div>
          <div class="empty-text">No games yet</div>
          <button class="btn btn-primary" onclick="openNewGameModal()">Create your first game</button>
        </div>
      </div>
    </div>

    <!-- TEAMS SECTION -->
    <div class="section" id="section-teams">
      <div class="page-header">
        <h1 class="page-title">Teams</h1>
        <button class="btn btn-primary" onclick="openNewTeamModal()">+ New Team</button>
      </div>
      <div id="teams-list"></div>
    </div>

    <!-- SPORTS SECTION -->
    <div class="section" id="section-sports">
      <div class="page-header">
        <h1 class="page-title">Sports</h1>
      </div>
      <div class="row-list" id="sports-list"></div>
    </div>

  </div>
</div>

<!-- NEW GAME MODAL -->
<div class="modal-overlay hidden" id="modal-new-game">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">New Game</div>
      <button class="modal-close" onclick="closeModal('modal-new-game')">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group full">
        <label class="form-label">Game name (optional)</label>
        <input type="text" id="game-name" placeholder="e.g. State League Round 4">
      </div>
      <div class="form-group full">
        <label class="form-label">Sport</label>
        <select id="game-sport">
          <option value="">Select sport...</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Home team</label>
        <select id="game-home">
          <option value="">Select team...</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Away team</label>
        <select id="game-away">
          <option value="">Select team...</option>
        </select>
      </div>
      <div class="form-group full">
        <label class="form-label">Scheduled date &amp; time</label>
        <input type="datetime-local" id="game-date">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-new-game')">Cancel</button>
      <button class="btn btn-primary" onclick="createGame()">Create Game</button>
    </div>
  </div>
</div>

<!-- NEW TEAM MODAL -->
<div class="modal-overlay hidden" id="modal-new-team">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">New Team</div>
      <button class="modal-close" onclick="closeModal('modal-new-team')">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group full">
        <label class="form-label">Full team name</label>
        <input type="text" id="team-name" placeholder="e.g. West Adelaide Bearcats">
      </div>
      <div class="form-group">
        <label class="form-label">Short name (3–4 chars)</label>
        <input type="text" id="team-short" placeholder="e.g. WAB" maxlength="4">
      </div>
      <div class="form-group">
        <label class="form-label">Primary colour</label>
        <input type="color" id="team-color" value="#7a1525">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-new-team')">Cancel</button>
      <button class="btn btn-primary" onclick="createTeam()">Create Team</button>
    </div>
  </div>
</div>

<!-- URLS MODAL -->
<div class="modal-overlay hidden" id="modal-urls">
  <div class="modal" style="max-width:620px;">
    <div class="modal-header">
      <div class="modal-title" id="urls-modal-title">Game URLs</div>
      <button class="modal-close" onclick="closeModal('modal-urls')">×</button>
    </div>

    <div class="urls-section">
      <div class="urls-section-title">Operator — send to remote operator</div>
      <div class="url-box">
        <div class="url-label">Operator</div>
        <div class="url-value" id="url-operator"></div>
        <button class="btn-copy" onclick="copyUrl('url-operator', this)">Copy</button>
      </div>
    </div>

    <div class="urls-section">
      <div class="urls-section-title">OBS / VMix — Browser Sources (1920×1080)</div>
      <div class="url-box">
        <div class="url-label">Scoreboard</div>
        <div class="url-value" id="url-scoreboard"></div>
        <button class="btn-copy" onclick="copyUrl('url-scoreboard', this)">Copy</button>
      </div>
      <div class="url-box">
        <div class="url-label">Bug / DOG</div>
        <div class="url-value" id="url-bug"></div>
        <button class="btn-copy" onclick="copyUrl('url-bug', this)">Copy</button>
      </div>
      <div class="url-box">
        <div class="url-label">Full Screen</div>
        <div class="url-value" id="url-fullscreen"></div>
        <button class="btn-copy" onclick="copyUrl('url-fullscreen', this)">Copy</button>
      </div>
      <div class="url-box">
        <div class="url-label">Lower Third</div>
        <div class="url-value" id="url-lowerthird"></div>
        <button class="btn-copy" onclick="copyUrl('url-lowerthird', this)">Copy</button>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-urls')">Close</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" role="status"></div>

<script>
  const BASE = window.location.origin;
  const ADMIN_PASSWORD = prompt('Admin password:') || '';

  const headers = {
    'Content-Type': 'application/json',
    'x-admin-password': ADMIN_PASSWORD
  };

  // ── State ──────────────────────────────────────────────────
  let games = [], teams = [], sports = [];

  // ── Init ───────────────────────────────────────────────────
  async function init() {
    await Promise.all([loadGames(), loadTeams(), loadSports()]);
  }

  // ── Navigation ─────────────────────────────────────────────
  function showSection(name, el) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`section-${name}`).classList.add('active');
    el.classList.add('active');
  }

  // ── Games ──────────────────────────────────────────────────
  async function loadGames() {
    try {
      const r = await fetch(`${BASE}/api/games`);
      games = await r.json();
      renderGames();
    } catch(e) { showToast('Failed to load games', 'error'); }
  }

  function renderGames() {
    const grid = document.getElementById('games-grid');
    if (!games.length) {
      grid.innerHTML = `<div class="empty">
        <div class="empty-icon">🎮</div>
        <div class="empty-text">No games yet</div>
        <button class="btn btn-primary" onclick="openNewGameModal()">Create your first game</button>
      </div>`;
      return;
    }
    grid.innerHTML = games.map(g => `
      <div class="game-card">
        <div class="game-card-header">
          <div class="game-status status-${g.status}">${g.status.replace('_',' ')}</div>
          <div class="game-sport-label">${g.sport_name || ''}</div>
        </div>
        <div class="game-teams">${g.home_name || '?'} vs ${g.away_name || '?'}</div>
        <div class="game-meta">
          ${g.scheduled_at ? new Date(g.scheduled_at).toLocaleString('en-AU', {weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : 'No date set'}
        </div>
        <div class="game-score">${g.home_score ?? 0} – ${g.away_score ?? 0}</div>
        <div class="game-actions">
          <button class="btn btn-secondary btn-sm" onclick="showUrls('${g.id}')">URLs</button>
          <button class="btn btn-danger btn-sm" onclick="deleteGame('${g.id}')">Delete</button>
        </div>
      </div>
    `).join('');
  }

  function openNewGameModal() {
    // Populate dropdowns
    const sportSel = document.getElementById('game-sport');
    sportSel.innerHTML = '<option value="">Select sport...</option>' +
      sports.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

    const teamOpts = '<option value="">Select team...</option>' +
      teams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    document.getElementById('game-home').innerHTML = teamOpts;
    document.getElementById('game-away').innerHTML = teamOpts;

    // Default date to tomorrow
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    tomorrow.setHours(18, 0, 0, 0);
    document.getElementById('game-date').value = tomorrow.toISOString().slice(0,16);

    openModal('modal-new-game');
  }

  async function createGame() {
    const body = {
      name: document.getElementById('game-name').value,
      sport_id: document.getElementById('game-sport').value,
      home_team_id: document.getElementById('game-home').value,
      away_team_id: document.getElementById('game-away').value,
      scheduled_at: document.getElementById('game-date').value,
    };

    if (!body.sport_id || !body.home_team_id || !body.away_team_id) {
      showToast('Please select sport, home team, and away team', 'error');
      return;
    }

    try {
      const r = await fetch(`${BASE}/api/games`, { method: 'POST', headers, body: JSON.stringify(body) });
      const game = await r.json();
      closeModal('modal-new-game');
      await loadGames();
      showToast('Game created!', 'success');
      // Immediately show URLs
      showUrlsFromGame(game);
    } catch(e) { showToast('Failed to create game', 'error'); }
  }

  async function deleteGame(id) {
    if (!confirm('Delete this game? This cannot be undone.')) return;
    await fetch(`${BASE}/api/games/${id}`, { method: 'DELETE', headers });
    await loadGames();
    showToast('Game deleted');
  }

  // ── URLs modal ─────────────────────────────────────────────
  async function showUrls(gameId) {
    try {
      const r = await fetch(`${BASE}/api/games/${gameId}`);
      const game = await r.json();
      const urls = {
        operator: `${BASE}/operate/${game.operator_token}`,
        overlayScoreboard: `${BASE}/overlay/${game.id}/scoreboard`,
        overlayBug: `${BASE}/overlay/${game.id}/bug`,
        overlayFullscreen: `${BASE}/overlay/${game.id}/fullscreen`,
        overlayLowerthird: `${BASE}/overlay/${game.id}/lowerthird`,
      };
      showUrlsFromGame({ ...game, urls });
    } catch(e) { showToast('Failed to load URLs', 'error'); }
  }

  function showUrlsFromGame(game) {
    const urls = game.urls || {
      operator: `${BASE}/operate/${game.operator_token}`,
      overlayScoreboard: `${BASE}/overlay/${game.id}/scoreboard`,
      overlayBug: `${BASE}/overlay/${game.id}/bug`,
      overlayFullscreen: `${BASE}/overlay/${game.id}/fullscreen`,
      overlayLowerthird: `${BASE}/overlay/${game.id}/lowerthird`,
    };

    document.getElementById('urls-modal-title').textContent =
      `${game.home_name || 'Home'} vs ${game.away_name || 'Away'}`;
    document.getElementById('url-operator').textContent = urls.operator;
    document.getElementById('url-scoreboard').textContent = urls.overlayScoreboard;
    document.getElementById('url-bug').textContent = urls.overlayBug;
    document.getElementById('url-fullscreen').textContent = urls.overlayFullscreen;
    document.getElementById('url-lowerthird').textContent = urls.overlayLowerthird;
    openModal('modal-urls');
  }

  function copyUrl(elementId, btn) {
    const text = document.getElementById(elementId).textContent;
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  // ── Teams ──────────────────────────────────────────────────
  async function loadTeams() {
    try {
      const r = await fetch(`${BASE}/api/admin/teams`);
      teams = await r.json();
      renderTeams();
    } catch(e) { console.error(e); }
  }

  function renderTeams() {
    const list = document.getElementById('teams-list');
    if (!teams.length) {
      list.innerHTML = `<div class="empty">
        <div class="empty-icon">👥</div>
        <div class="empty-text">No teams yet</div>
        <button class="btn btn-primary" onclick="openNewTeamModal()">Add your first team</button>
      </div>`;
      return;
    }
    list.innerHTML = `<div class="row-list">${teams.map(t => `
      <div class="data-row">
        <div class="team-color-swatch" style="background:${t.primary_color || '#333'}"></div>
        <div class="row-info">
          <div class="row-name">${t.name}</div>
          <div class="row-sub">${t.short_name || ''}</div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteTeam('${t.id}')">Delete</button>
      </div>
    `).join('')}</div>`;
  }

  function openNewTeamModal() {
    document.getElementById('team-name').value = '';
    document.getElementById('team-short').value = '';
    document.getElementById('team-color').value = '#7a1525';
    openModal('modal-new-team');
  }

  async function createTeam() {
    const name = document.getElementById('team-name').value.trim();
    if (!name) { showToast('Team name is required', 'error'); return; }

    const body = {
      name,
      short_name: document.getElementById('team-short').value.trim().toUpperCase(),
      primary_color: document.getElementById('team-color').value,
    };

    try {
      await fetch(`${BASE}/api/admin/teams`, { method: 'POST', headers, body: JSON.stringify(body) });
      closeModal('modal-new-team');
      await loadTeams();
      showToast('Team created!', 'success');
    } catch(e) { showToast('Failed to create team', 'error'); }
  }

  async function deleteTeam(id) {
    if (!confirm('Delete this team?')) return;
    await fetch(`${BASE}/api/admin/teams/${id}`, { method: 'DELETE', headers });
    await loadTeams();
    showToast('Team deleted');
  }

  // ── Sports ─────────────────────────────────────────────────
  async function loadSports() {
    try {
      const r = await fetch(`${BASE}/api/admin/sports`);
      sports = await r.json();
      renderSports();
    } catch(e) { console.error(e); }
  }

  function renderSports() {
    const list = document.getElementById('sports-list');
    list.innerHTML = sports.map(s => `
      <div class="data-row">
        <div class="row-info">
          <div class="row-name">${s.name}</div>
          <div class="row-sub">${s.config?.periods?.join(', ') || ''} · ${s.config?.clockDirection === 'down' ? 'Count down' : 'Count up'}</div>
        </div>
        ${s.is_preset ? '<span class="preset-badge">Preset</span>' : ''}
      </div>
    `).join('');
  }

  // ── Modal helpers ──────────────────────────────────────────
  function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
  function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.add('hidden');
    });
  });

  // ── Toast ──────────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `${type} show`;
    t.id = 'toast';
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── Connection indicator ───────────────────────────────────
  async function checkHealth() {
    try {
      await fetch(`${BASE}/health`);
      document.getElementById('conn-dot').style.cssText = 'background:#22c55e;box-shadow:0 0 6px #22c55e';
      document.getElementById('conn-text').style.color = '#444';
      document.getElementById('conn-text').textContent = 'Connected';
    } catch {
      document.getElementById('conn-dot').style.cssText = 'background:#C41E1E;box-shadow:0 0 6px #C41E1E';
      document.getElementById('conn-text').style.color = '#C41E1E';
      document.getElementById('conn-text').textContent = 'Disconnected';
    }
  }

  setInterval(checkHealth, 10000);
  init();
</script>
</body>
</html>
