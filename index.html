function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current; if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    offsetRef.current = {
      x: Math.min(Math.max(PAD, window.innerWidth - w - PAD), Math.max(PAD, offsetRef.current.x)),
      y: Math.min(Math.max(PAD, window.innerHeight - h - PAD), Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) ro.observe(document.documentElement);
    else window.addEventListener('resize', clampToViewport);
    return () => { if (ro) ro.disconnect(); else window.removeEventListener('resize', clampToViewport); };
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = (e) => {
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right, startBottom = window.innerHeight - r.bottom;
    const move = (ev) => { offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) }; clampToViewport(); };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}><b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return <><div className="twk-sect">{label}</div>{children}</>;
}
function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl"><span>{label}</span>{value != null && <span className="twk-val">{value}</span>}</div>
      {children}
    </div>
  );
}
function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step} value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'} role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}
function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value); valueRef.current = value;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX); if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}
function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder} onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}
function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakSlider, TweakToggle, TweakRadio, TweakText, TweakColor });
  </script>

/* ── Scroll reveal ── */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal,.reveal-left,.reveal-right,.reveal-zoom');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) { e.target.classList.add('visible'); }
        else { e.target.classList.remove('visible'); }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
}

/* ── Canvas speed lines (dark sections only) ── */
const SpeedCanvas = ({ style }) => {
  const ref = useRef();
  useEffect(() => {
    const canvas = ref.current;if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let raf;
    const lines = Array.from({ length: 24 }, () => ({
      x: Math.random() * 1600, y: Math.random() * 900,
      len: 60 + Math.random() * 180, speed: 1.5 + Math.random() * 3,
      alpha: 0.05 + Math.random() * 0.09, width: 0.5 + Math.random() * 0.8
    }));
    const resize = () => {canvas.width = canvas.offsetWidth;canvas.height = canvas.offsetHeight;};
    resize();
    window.addEventListener('resize', resize);
    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      lines.forEach((l) => {
        const g = ctx.createLinearGradient(l.x - l.len, l.y, l.x, l.y);
        g.addColorStop(0, 'transparent');
        g.addColorStop(0.6, `rgba(196,30,30,${l.alpha})`);
        g.addColorStop(1, 'transparent');
        ctx.beginPath();ctx.moveTo(l.x - l.len, l.y);ctx.lineTo(l.x, l.y);
        ctx.strokeStyle = g;ctx.lineWidth = l.width;ctx.stroke();
        l.x += l.speed;
        if (l.x - l.len > canvas.width) {l.x = -l.len;l.y = Math.random() * canvas.height;}
      });
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => {cancelAnimationFrame(raf);window.removeEventListener('resize', resize);};
  }, []);
  return <canvas ref={ref} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none', ...style }} />;
};

                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <div style={{ width: 4, height: 4, borderRadius: '50%', background: '#333' }} />

                </div>

            <span style={{ fontFamily: 'Barlow', fontSize: 12, color: '#444' }}>Scoped individually — contact us for a tailored quote.</span>

};

const ContactSection = ({ accent, formTab, setFormTab }) => {
  const [sentGeneral, setSentGeneral] = useState(false);
  const [generalError, setGeneralError] = useState(false);
  const [sentDetailed, setSentDetailed] = useState(false);
  const [detailedError, setDetailedError] = useState(false);
  const [activeService, setActiveService] = useState('corporate');
  const [cameras, setCameras] = useState(2);
  const [graphics, setGraphics] = useState(true);
  const [videoPlayback, setVideoPlayback] = useState(false);
  const [clientFeed, setClientFeed] = useState(false);
  const [audio, setAudio] = useState('ours');

  const inp = { background: '#111', border: '1px solid #222', borderRadius: 4, color: '#fff', fontFamily: 'Barlow', fontSize: 14, padding: '11px 14px', outline: 'none', width: '100%' };

    <div className="cfg-toggle" onClick={() => onChange(!value)} style={{ borderBottomColor: '#1e1e1e', cursor: 'pointer' }}>

        <div style={{ fontFamily: 'Barlow', fontSize: 13, fontWeight: 600, color: '#ccc' }}>{label}</div>
        {sublabel && <div style={{ fontFamily: 'Barlow', fontSize: 11, color: '#777', marginTop: 2 }}>{sublabel}</div>}
      </div>
      <div className="toggle-track" style={{ background: value ? accent : '#2a2a2a' }}>
        <div className="toggle-thumb" style={{ transform: value ? 'translateX(18px)' : 'translateX(0)' }} />
      </div>
    </div>
  );

  const included = [`${cameras} Cam${cameras > 1 ? 's' : ''}`];
  if (graphics) included.push('Graphics');
  if (videoPlayback) included.push('Playback');
  if (clientFeed) included.push('Client Feed');
  included.push(audio === 'ours' ? 'Our Team Audio' : audio === 'client' ? 'Your Team Audio' : 'Hybrid Audio');

  const SuccessTick = ({ msg }) => (
    <div style={{ padding: '40px', textAlign: 'center', border: '1px solid #1e1e1e', borderRadius: 4 }}>
      <div style={{ width: 44, height: 44, background: `rgba(196,30,30,0.15)`, border: `1px solid rgba(196,30,30,0.3)`, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 14px' }}>
        <svg width="18" height="14" viewBox="0 0 22 18" fill="none"><path d="M1 9l7 7L21 1" stroke={accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </div>
      <div style={{ fontFamily: 'Blue Highway', fontSize: 20, textTransform: 'uppercase', color: '#fff', marginBottom: 6 }}>Sent</div>
      <p style={{ fontFamily: 'Barlow', fontSize: 13, color: '#888' }}>{msg}</p>
    </div>
  );

  return (
    <section id="contact" style={{ position: 'relative', background: '#0A0A0A', padding: '40px 0 0', overflow: 'hidden' }}>
      <SpeedCanvas />
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 2, background: `linear-gradient(90deg, transparent, ${accent} 35%, ${accent} 70%, transparent)` }} />

      <div className="section-inner" style={{ position: 'relative', zIndex: 10, maxWidth: 1280, margin: '0 auto', padding: '0 40px' }}>
        {/* Headline */}
        <div style={{ textAlign: 'center', marginBottom: 24 }}>
          <div className="reveal" style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: `rgba(196,30,30,0.1)`, border: `1px solid rgba(196,30,30,0.25)`, borderRadius: 2, padding: '5px 12px', marginBottom: 0 }}>
            <span style={{ width: 6, height: 6, background: accent, borderRadius: '50%', display: 'inline-block', animation: 'live-pulse 2s infinite' }} />
            <span style={{ fontFamily: 'Blue Highway', fontSize: 11, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: accent }}>Ready to Go Live</span>
          </div>
        </div>

        {/* Tab toggle */}
        <div className="reveal" style={{ display: 'flex', justifyContent: 'center', marginBottom: 32 }}>
          <div style={{ display: 'inline-flex', background: '#111', border: '1px solid #1a1a1a', borderRadius: 4, padding: 4 }}>
            {[['general','General Enquiry'],['detailed','Quote']].map(([key, label]) => (
              <button key={key} onClick={() => setFormTab(key)} style={{ padding: '15px 40px', borderRadius: 3, border: 'none', cursor: 'pointer', fontFamily: 'Barlow', fontSize: 14, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', background: formTab === key ? accent : 'transparent', color: formTab === key ? '#fff' : '#555', transition: 'all .2s' }}>{label}</button>
            ))}
          </div>
        </div>

        {/* Forms */}
        <div style={{ maxWidth: 680, margin: '0 auto' }}>

          {/* General Enquiry */}
          {formTab === 'general' && (
            <div style={{ background: '#0D0D0D', border: '1px solid #1a1a1a', borderRadius: 4, padding: '40px' }}>
              <div style={{ fontFamily: 'Barlow', fontSize: 10, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: accent, marginBottom: 6 }}>General Enquiry</div>
              <div style={{ fontFamily: 'Blue Highway', fontSize: 22, fontWeight: 700, textTransform: 'uppercase', color: '#fff', marginBottom: 24 }}>Quick Question</div>
              {sentGeneral ? <SuccessTick msg="Thanks for contacting us, we will get back to you ASAP." /> : (
                <form onSubmit={async e => {
                  e.preventDefault();
                  setGeneralError(false);
                  try {
                    const res = await fetch('https://formspree.io/f/mjgjdabw', {
                      method: 'POST', headers: { 'Accept': 'application/json' },
                      body: new FormData(e.target)
                    });
                    if (res.ok) { setSentGeneral(true); } else { setGeneralError(true); }
                  } catch { setGeneralError(true); }
                }} style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                    <input name="name" style={inp} placeholder="Your Name" required />
                    <input name="email" type="email" style={inp} placeholder="Email" required />
                  </div>
                  <input name="organisation" style={inp} placeholder="Organisation" />
                  <textarea name="message" rows={5} style={{ ...inp, resize: 'vertical' }} placeholder="Tell us about your event, or ask us anything." />
                  {generalError && <div style={{ fontFamily: 'Barlow', fontSize: 12, color: '#e05555' }}>Something went wrong — please try again or email us at contact@overdrivefilms.com</div>}
                  <button type="submit" className="btn-primary" style={{ alignSelf: 'flex-start', padding: '12px 28px', fontSize: 12, background: accent }}>Send Enquiry</button>
                </form>
              )}
            </div>
          )}

          {/* Detailed Quote */}
          {formTab === 'detailed' && (
            <div style={{ background: '#0D0D0D', border: '1px solid #1a1a1a', borderRadius: 4, padding: '40px' }}>
              <div style={{ fontFamily: 'Barlow', fontSize: 10, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: accent, marginBottom: 6 }}>Detailed Quote</div>
              <div style={{ fontFamily: 'Blue Highway', fontSize: 22, fontWeight: 700, textTransform: 'uppercase', color: '#fff', marginBottom: 24 }}>Build Your Production</div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>

                    <div style={{ position: 'relative' }}>
                      <select value={activeService} onChange={e => { setActiveService(e.target.value); setCameras(2); setGraphics(true); setVideoPlayback(false); setClientFeed(false); setAudio('ours'); }}
                        style={{ ...inp, appearance: 'none', paddingRight: 36, cursor: 'pointer', fontWeight: 600 }}>
                        {Object.entries(SERVICE_DATA).map(([key, s]) => <option key={key} value={key}>{s.label} — {s.tagline}</option>)}
                      </select>
                      <svg style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none' }} width="11" height="7" viewBox="0 0 12 8" fill="none"><path d="M1 1l5 5 5-5" stroke="#555" strokeWidth="1.5" strokeLinecap="round"/></svg>
                    </div>
                  </div>
                  <div>
                    <div style={{ fontFamily: 'Barlow', fontSize: 10, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#888', marginBottom: 8 }}>Cameras</div>
                    <div style={{ display: 'flex', gap: 6 }}>
                      {[1,2,3,4,5,6].map(n => (
                        <button type="button" key={n} onClick={() => setCameras(n)}
                          style={{ width: 38, height: 36, borderRadius: 4, border: `1.5px solid ${cameras === n ? accent : '#222'}`, background: cameras === n ? `rgba(196,30,30,0.12)` : '#0A0A0A', color: cameras === n ? accent : '#444', fontFamily: 'Blue Highway', fontSize: 14, fontWeight: 700, cursor: 'pointer', transition: 'all .15s' }}>{n}</button>

                  <div style={{ border: '1px solid #1e1e1e', borderRadius: 4, padding: '0 14px' }}>
                    <Toggle label="On Screen Graphic" sublabel="Lower Third Graphics, Titles, Logos" value={graphics} onChange={setGraphics} />
                    <Toggle label="Video Playback" sublabel="Play pre-recorded videos" value={videoPlayback} onChange={setVideoPlayback} />
                    <Toggle label="Presentation/Computer Input" sublabel="Presentations, Keynotes, Personal Computer Input, HDMI or SDI" value={clientFeed} onChange={setClientFeed} />
                  </div>
                  <div>
                    <div style={{ fontFamily: 'Barlow', fontSize: 10, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#888', marginBottom: 8 }}>Livestream Audio Input</div>
                    <div style={{ display: 'flex', gap: 6 }}>
                      {[['ours','Our Team'],['client','Your Team'],['hybrid','Hybrid']].map(([val, lbl]) => (
                        <button type="button" key={val} onClick={() => setAudio(val)}
                          style={{ flex: 1, padding: '8px 4px', borderRadius: 4, border: `1.5px solid ${audio === val ? accent : '#222'}`, background: audio === val ? `rgba(196,30,30,0.1)` : '#0A0A0A', color: audio === val ? accent : '#444', fontFamily: 'Barlow', fontSize: 11, fontWeight: 700, letterSpacing: '0.04em', textTransform: 'uppercase', cursor: 'pointer', transition: 'all .15s' }}>{lbl}</button>

                  </div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                    {included.map((item, i) => <span key={i} style={{ fontFamily: 'Barlow', fontSize: 11, fontWeight: 600, color: accent, background: `rgba(196,30,30,0.08)`, border: `1px solid rgba(196,30,30,0.2)`, borderRadius: 2, padding: '3px 9px' }}>{item}</span>)}
                  </div>
                  <form onSubmit={async e => {
                    e.preventDefault();
                    setDetailedError(false);
                    try {
                      const data = new FormData(e.target);
                      data.append('service', activeService);
                      data.append('cameras', cameras);
                      data.append('graphics_package', graphics ? 'Yes' : 'No');
                      data.append('video_playback', videoPlayback ? 'Yes' : 'No');
                      data.append('computer_or_feed_input', clientFeed ? 'Yes' : 'No');
                      data.append('audio', audio);
                      const res = await fetch('https://formspree.io/f/xaqazpwb', {
                        method: 'POST', headers: { 'Accept': 'application/json' }, body: data
                      });
                      if (res.ok) { setSentDetailed(true); } else { setDetailedError(true); }
                    } catch { setDetailedError(true); }
                  }} style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                      <input name="name" style={inp} placeholder="Your Name" required />
                      <input name="email" type="email" style={inp} placeholder="Email" required />
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                      <input name="event_date" style={inp} type="date" />
                      <input name="venue" style={inp} placeholder="Venue / Location" />
                    </div>
                    <textarea name="notes" rows={2} style={{ ...inp, resize: 'none' }} placeholder="Anything else…" />
                    {detailedError && <div style={{ fontFamily: 'Barlow', fontSize: 12, color: '#e05555' }}>Something went wrong — please try again or email us directly at contact@overdrivefilms.com</div>}
                    <button type="submit" className="btn-primary" style={{ padding: '12px 28px', fontSize: 12, background: accent }}>Send Quote Request</button>
                  </form>
                </div>
              )}
            </div>
          )}

        </div>

        {/* Feature strip */}
        <div style={{ display: 'flex', borderTop: '1px solid #141414', marginTop: 0 }}>
          {['No obligation','24hr response','Adelaide based','Full HD quality'].map((txt, i) => (
            <div key={i} style={{ flex: 1, textAlign: 'center', padding: '20px 14px', borderRight: i < 3 ? '1px solid #141414' : 'none' }}>
              <div style={{ fontFamily: 'Barlow', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#666' }}>{txt}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};

const BookModal = ({ onClose, accent }) => {
  const [sent, setSent] = useState(false);
  const inp = { background: '#F9F9F9', border: '1px solid #E8E8E8', borderRadius: 4, color: '#0A0A0A', fontFamily: 'Barlow', fontSize: 14, padding: '10px 14px', outline: 'none', width: '100%' };

              <p style={{ fontFamily: 'Barlow', fontSize: 14, color: '#aaa' }}>We'll be in touch within 24 hours.</p>

          <>
              <div style={{ fontFamily: 'Barlow', fontSize: 10, fontWeight: 700, letterSpacing: '0.16em', textTransform: 'uppercase', color: accent, marginBottom: 8 }}>Get in Touch</div>

              <form onSubmit={(e) => {e.preventDefault();setSent(true);}} style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                  <input style={inp} placeholder="Your Name" />

                <select style={{ ...inp, appearance: 'none' }}>

                  <option>Corporate</option><option>Event</option><option>Sport</option><option>Broadcast</option>

                <textarea rows={4} style={{ ...inp, resize: 'vertical' }} placeholder="Tell us about your event — date, venue, audience size…" />

              </form>
            </>
          }
        </div>
      </div>
    </>);

};

/* ══════════════════════════════════════════
   APP
══════════════════════════════════════════ */
const App = () => {
  const [showreel, setShowreel] = useState(false);
  const [activeService, setActiveService] = useState(null);
  const [showPricing, setShowPricing] = useState(false);
  const [formTab, setFormTab] = useState('general');
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = tweaks.accentColor;

  const goToQuote = () => {
    setFormTab('detailed');
    setTimeout(() => {
      const el = document.getElementById('contact');
      if (el) el.scrollIntoView({ behavior: 'smooth' });
    }, 0);
  };

  return (
    <>
      <Header tweaks={tweaks} />
      <Hero onShowreel={() => setShowreel(true)} tweaks={tweaks} />
      <Services onServiceClick={setActiveService} onPricingOpen={() => setShowPricing(true)} onQuoteClick={goToQuote} accent={accent} />
      <Team accent={accent} />
      <Testimonials accent={accent} />
      <ContactSection accent={accent} formTab={formTab} setFormTab={setFormTab} />
      <Footer />

      {activeService && <ServiceModal service={activeService} onClose={() => setActiveService(null)} onServiceChange={setActiveService} accent={accent} />}
      {showPricing && <PricingModal onClose={() => setShowPricing(false)} accent={accent} />}
      {showreel && <ShowreelModal onClose={() => setShowreel(false)} />}

      <TweaksPanel>
        <TweakSection label="Navigation" />
        <TweakRadio label="Logo Style" value={tweaks.logoStyle} options={['banner', 'square', 'square+wordmark']} onChange={(v) => setTweak('logoStyle', v)} />
        <TweakSlider label="Logo Size" value={tweaks.logoHeight} min={24} max={52} step={2} unit="px" onChange={(v) => setTweak('logoHeight', v)} />
        <TweakRadio label="Nav Background" value={tweaks.navStyle} options={['transparent', 'solid']} onChange={(v) => setTweak('navStyle', v)} />
        <TweakSection label="Brand" />
        <TweakColor label="Accent Colour" value={tweaks.accentColor} onChange={(v) => setTweak('accentColor', v)} />
        <TweakSection label="Hero Copy" />
        <TweakText label="Primary CTA" value={tweaks.heroCta} onChange={(v) => setTweak('heroCta', v)} />
        <TweakText label="Showreel Button" value={tweaks.showreel} onChange={(v) => setTweak('showreel', v)} />
      </TweaksPanel>
    </>);

};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
